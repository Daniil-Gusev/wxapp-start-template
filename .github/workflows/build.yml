name: Build

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  config:
    name: Config
    runs-on: ubuntu-latest
    outputs:
      with_webview: ${{ steps.config.outputs.with_webview }}
    steps:
      - id: config
        run: |
          echo "with_webview=false" >> "$GITHUB_OUTPUT"

  linux:
    name: Linux
    needs: config
    uses: ./.github/workflows/linux.yml
    with:
      package: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
      with_webview: ${{ needs.config.outputs.with_webview }}

  windows:
    name: Windows
    needs: config
    uses: ./.github/workflows/windows.yml
    with:
      package: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
      with_webview: ${{ needs.config.outputs.with_webview }}

  macos:
    name: macOS
    needs: config
    uses: ./.github/workflows/macos.yml
    with:
      package: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
      with_webview: ${{ needs.config.outputs.with_webview }}

  release:
    name: Draft release
    needs: [linux, windows, macos]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
